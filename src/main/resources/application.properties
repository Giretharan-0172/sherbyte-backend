# src/main/resources/application.properties

# Server
server.port=${PORT:8080}
spring.application.name=sherbyte
spring.config.import=optional:file:.env[.properties]

# PostgreSQL via Supabase
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:5432/postgres?sslmode=require
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis (Upstash)
spring.data.redis.url=${REDIS_URL}
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# News APIs
app.newsapi.key=${NEWSAPI_KEY}
app.gnews.key=${GNEWS_KEY}
app.currents.key=${CURRENTS_KEY}

# Gemini AI
app.gemini.key=${GEMINI_API_KEY}
app.gemini.model=gemini-2.5-flash

# Security
app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5500}

# Logging
logging.level.com.sherbyte=INFO
logging.level.org.springframework.security=WARN
